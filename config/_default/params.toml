# -- Theme Options --
# These options control how the theme functions and allow you to
# customise the display of your website.
#
# Refer to the theme docs for more details about each of these parameters.
# https://blowfish.page/docs/configuration/#theme-parameters

colorScheme = "blowfish"
defaultAppearance = "dark" # valid options: light or dark
autoSwitchAppearance = true
disableTextInHeader = true # removes text version of logo

enableSearch = true
enableCodeCopy = false

mainSections = ["posts"] # ["section1", "section2"] Sections that should be displayed in the recent articles list. If not provided the section with the greatest number of articles is used.
# robots = ""

disableImageOptimization = false

defaultBackgroundImage = "img/background.jpg" # used as default for background images
defaultFeaturedImage = "img/featured.jpg"  # used as default for featured images in all articles

highlightCurrentMenuArea = true
smartTOC = true
smartTOCHideUnfocusedChildren = true

[header]
  layout = "basic" # valid options: basic, fixed, fixed-fill, fixed-gradient, fixed-fill-blur

[footer]
    showMenu = true
    showCopyright = false
    showThemeAttribution = false
    showAppearanceSwitcher = true
    showScrollToTop = true

[homepage]
    layout = "background"
    showHero = true
    heroStyle = "background"
    layoutBackgroundBlur = true
    layoutBackgroundHeaderSpace = true
    homepageImage = "moutains_joelmarks_pexels-koustabh-biswas-3737179.jpg"
    showRecent = true
    showRecentItems = 5
    showMoreLink = true
    showMoreLinkDest = "/posts"
    cardView = true
    cardViewScreenWidth = false

[article]
    showDate = true
    showViews = true
    showLikes = true
    showDateOnlyInArticle = false
    showDateUpdated = false
    showAuthor = true
    showHero = true
    heroStyle = "background"
    layoutBackgroundBlur = true
    layoutBackgroundHeaderSpace = true
    showBreadcrumbs = true
    showDraftLabel = true
    showEdit = false
    editAppendPath = true
    seriesOpened = false
    showHeadingAnchors = true
    showPagination = true
    invertPagination = true
    showReadingTime = true
    showTableOfContents = true
    showTaxonomies = false
    showAuthorsBadges = false
    showWordCount = true
    showZenMode = true

[list]
    showHero = false
    layoutBackgroundBlur = true
    layoutBackgroundHeaderSpace = true
    showBreadcrumbs = false
    showSummary = false
    showViews = false
    showLikes = false
    showTableOfContents = false
    showCards = false
    groupByYear = true
    cardView = false
    cardViewScreenWidth = false
    constrainItemsWidth = false

[sitemap]
    excludedKinds = [ "taxonomy", "term" ]

[taxonomy]
    showTermCount = true
    showHero = false
    showBreadcrumbs = false
    showViews = false
    showLikes = false
    showTableOfContents = false
    cardView = false

[term]
    showHero = false
    showBreadcrumbs = false
    showViews = false
    showLikes = false
    showTableOfContents = true
    groupByYear = false
    cardView = false
    cardViewScreenWidth = false

